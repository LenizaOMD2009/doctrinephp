<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {{ vite('resources/css/app.css') }}
    <title>Autenticação do Sistema</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #e8e8e8;
            font-family: 'DM Sans', sans-serif;
        }

        .login-card {
            display: flex;
            width: 860px;
            min-height: 520px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.18);
        }
        .login-image-side {
            flex: 1;
            background-color: #1a2a3a; 
            background-image: url('/img/jaim.jpeg');
            background-size: cover;
            background-position: center;

            display: flex;
            align-items: flex-end;
            padding: 40px;
            position: relative;
        }

        .login-image-side::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to bottom,
                rgba(0,0,0,0.1) 0%,
                rgba(0,0,0,0.4) 100%
            );
        }

        .welcome-text {
            position: relative;
            z-index: 1;
            color: #ffffff;
            font-family: 'Playfair Display', serif;
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        /* Placeholder visível enquanto sem imagem */
        .image-placeholder-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -60%);
            text-align: center;
            color: rgba(255,255,255,0.35);
            font-size: 0.8rem;
            letter-spacing: 0.05em;
            z-index: 1;
            pointer-events: none;
        }

        .image-placeholder-hint .icon {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 8px;
            opacity: 0.5;
        }

        /* Lado direito — formulário */
        .login-form-side {
            width: 340px;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 52px 44px;
        }

        .login-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            color: #111;
            margin-bottom: 36px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 0.78rem;
            font-weight: 500;
            color: #888;
            margin-bottom: 6px;
            letter-spacing: 0.03em;
        }

        .form-group input {
            width: 100%;
            border: none;
            border-bottom: 1.5px solid #ddd;
            padding: 8px 0;
            font-size: 0.95rem;
            font-family: 'DM Sans', sans-serif;
            color: #222;
            background: transparent;
            outline: none;
            transition: border-color 0.25s;
        }

        .form-group input:focus {
            border-bottom-color: #1a2a3a;
        }

        .form-group input::placeholder {
            color: transparent;
        }

        .forgot-link {
            position: absolute;
            right: 0;
            top: 0;
            font-size: 0.72rem;
            color: #888;
            text-decoration: none;
            transition: color 0.2s;
        }

        .forgot-link:hover {
            color: #1a2a3a;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background-color: #1a2a3a;
            color: #fff;
            border: none;
            border-radius: 50px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            margin-top: 8px;
            letter-spacing: 0.04em;
            transition: background-color 0.25s, transform 0.15s;
        }

        .btn-login:hover {
            background-color: #0f1e2d;
            transform: translateY(-1px);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-google {
            width: 100%;
            padding: 12px;
            background-color: #fff;
            color: #444;
            border: 1.5px solid #ddd;
            border-radius: 50px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.88rem;
            font-weight: 400;
            cursor: pointer;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: border-color 0.2s, background 0.2s;
        }

        .btn-google:hover {
            border-color: #aaa;
            background-color: #fafafa;
        }

        .signup-link {
            text-align: center;
            margin-top: 28px;
            font-size: 0.78rem;
            color: #aaa;
        }

        .signup-link a {
            color: #1a2a3a;
            text-decoration: none;
            font-weight: 500;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="login-image-side">
            <span class="welcome-text">Welcome</span>
        </div>

        <!-- Lado direito: Formulário -->
        <div class="login-form-side">
            <h1 class="login-title">Login</h1>

            <form id="form">
                <div class="form-group">
                    <label for="login">Login, CPF, Telefone ou E-mail</label>
                    <input
                        type="text"
                        id="login"
                        name="login"
                        placeholder="Login, CPF, Telefone ou E-mail"
                        autofocus
                    >
                </div>

                <div class="form-group">
                    <label for="senha">Senha</label>
                    <a href="#" class="forgot-link">Esqueceu a senha?</a>
                    <input
                        type="password"
                        id="senha"
                        name="senha"
                        placeholder="Informe sua senha"
                    >
                </div>

                <button id="btnLogin" type="button" class="btn-login">
                    Login
                </button>

                <button id="loginGoogle" type="button" class="btn-google">
                    <svg width="16" height="16" viewBox="0 0 48 48">
                        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.29-8.16 2.29-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                    </svg>
                    Login com Google
                </button>
            </form>

            <p class="signup-link">
                Não tem uma conta? <a href="#">Cadastre-se</a>
            </p>
        </div>
    </div>

    {{ vite('resources/js/app.js') }}
</body>

</html>
